<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Barrel Defense — LastTokens</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            background: #1a1a2e;
        }
        canvas { display: block; }

        .overlay {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            pointer-events: none;
            z-index: 10;
        }
        .overlay.active { pointer-events: auto; }
        .overlay.hidden { display: none; }

        /* Start screen */
        #start-screen {
            background: linear-gradient(180deg, rgba(26,26,46,0.95), rgba(22,33,62,0.98));
        }
        #start-screen h1 {
            font-size: 3rem; font-weight: 900;
            color: #ff6b35; text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
            line-height: 1.1; margin-bottom: 0.3rem;
        }
        .subtitle {
            color: rgba(255,255,255,0.7); font-size: 0.95rem; margin-bottom: 1.5rem;
            max-width: 300px; text-align: center; line-height: 1.4;
        }

        /* Game over */
        #gameover-screen { background: rgba(0,0,0,0.85); }
        #gameover-screen h1 {
            font-size: 2.8rem; font-weight: 900; margin-bottom: 0.5rem;
        }
        #gameover-screen h1.lose { color: #ff6b6b; }
        #gameover-screen h1.win { color: #51cf66; }
        .stat { color: #ddd; font-size: 1.1rem; margin: 0.15rem 0; font-weight: 600; }
        .stat.highlight { color: #feca57; font-size: 1.4rem; }

        /* Wave complete */
        #wave-screen { background: rgba(0,0,0,0.8); }
        #wave-screen h1 { font-size: 2.2rem; font-weight: 900; color: #51cf66; margin-bottom: 0.8rem; }

        /* Upgrade shop */
        .upgrades {
            display: flex; flex-wrap: wrap; gap: 10px;
            justify-content: center; max-width: 360px; margin-bottom: 1rem;
        }
        .upgrade-btn {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.25);
            color: #fff; font-size: 0.85rem; font-weight: 700;
            padding: 0.6rem 1rem; border-radius: 12px;
            cursor: pointer; transition: all 0.15s;
            text-align: center; min-width: 140px;
        }
        .upgrade-btn:hover { background: rgba(255,255,255,0.2); border-color: #feca57; }
        .upgrade-btn:active { transform: scale(0.95); }
        .upgrade-btn .cost { color: #feca57; font-size: 0.75rem; display: block; margin-top: 2px; }
        .upgrade-btn.maxed { opacity: 0.4; pointer-events: none; }

        /* Buttons */
        .btn {
            background: linear-gradient(135deg, #ff6b35, #e55a2b);
            border: none; color: #fff;
            font-size: 1.3rem; font-weight: 800;
            padding: 0.9rem 3rem; border-radius: 50px;
            cursor: pointer; letter-spacing: 0.08em;
            box-shadow: 0 5px 20px rgba(255,107,53,0.3);
            transition: transform 0.1s;
            margin-top: 1rem;
        }
        .btn:active { transform: scale(0.95); }
        .btn.retry { background: linear-gradient(135deg, #339af0, #228be6); }
        .btn.next { background: linear-gradient(135deg, #51cf66, #40c057); }

        .credit {
            margin-top: 2rem; font-size: 0.7rem;
            color: rgba(255,255,255,0.4);
        }
        .credit a { color: rgba(255,255,255,0.6); text-decoration: none; }

        /* Difficulty selector */
        .difficulty {
            display: flex; gap: 8px; margin-bottom: 1.2rem;
        }
        .diff-btn {
            background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.3);
            color: #fff; font-size: 0.85rem; font-weight: 700;
            padding: 0.45rem 1rem; border-radius: 25px;
            cursor: pointer; transition: all 0.15s;
        }
        .diff-btn:active { transform: scale(0.95); }
        .diff-btn.selected {
            background: rgba(255,107,53,0.3); border-color: #ff6b35;
            box-shadow: 0 0 12px rgba(255,107,53,0.3);
        }

        /* HUD */
        #hud {
            position: absolute; top: 10px; left: 10px; right: 10px;
            display: none; justify-content: space-between;
            pointer-events: none; z-index: 5;
        }
        .hud-box {
            background: rgba(0,0,0,0.6); color: #fff;
            padding: 5px 12px; border-radius: 8px;
            font-size: 0.85rem; font-weight: 700;
        }

        /* Wave bar */
        #wave-bar {
            position: absolute; top: 45px; left: 50%; transform: translateX(-50%);
            width: min(250px, 60vw); height: 6px;
            background: rgba(255,255,255,0.15); border-radius: 3px;
            z-index: 5; display: none;
        }
        #wave-bar-fill {
            height: 100%; width: 0%; border-radius: 3px;
            background: linear-gradient(90deg, #ff6b35, #feca57);
            transition: width 0.2s;
        }

        /* Floating action text */
        #action-text {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%,-50%);
            font-size: 2.5rem; font-weight: 900; color: #fff;
            text-shadow: 3px 3px 0 rgba(0,0,0,0.4);
            z-index: 8; pointer-events: none;
            opacity: 0; transition: opacity 0.3s;
        }
        #action-text.show { opacity: 1; }

        @media (max-width: 600px) {
            #start-screen h1 { font-size: 2.2rem; }
            #gameover-screen h1 { font-size: 2rem; }
            .upgrade-btn { min-width: 120px; font-size: 0.8rem; padding: 0.5rem 0.8rem; }
        }
    </style>
</head>
<body>
    <div id="hud">
        <div class="hud-box">WAVE <span id="wave-display">1</span></div>
        <div class="hud-box" style="background:rgba(255,60,60,0.6)"><span id="weapon-display">Pistol</span></div>
        <div class="hud-box" style="background:rgba(255,107,53,0.6)">SQUAD <span id="squad-display">1</span></div>
        <div class="hud-box" style="background:rgba(200,160,0,0.6)"><span id="coin-display">0</span></div>
    </div>

    <div id="wave-bar"><div id="wave-bar-fill"></div></div>
    <div id="action-text"></div>

    <div id="start-screen" class="overlay active">
        <h1>BARREL<br>DEFENSE</h1>
        <p class="subtitle">Shoot barrels for upgrades. Shoot enemies to survive. How long can you hold?</p>
        <div class="difficulty">
            <button class="diff-btn" data-diff="easy">EASY</button>
            <button class="diff-btn selected" data-diff="normal">NORMAL</button>
            <button class="diff-btn" data-diff="hard">HARD</button>
        </div>
        <button class="btn" id="btn-start">DEFEND</button>
        <p class="credit">Powered by <a href="https://github.com/human-pages-ai">LastTokens</a></p>
    </div>

    <div id="wave-screen" class="overlay hidden">
        <h1>WAVE <span id="ws-wave">1</span> CLEAR!</h1>
        <p class="stat">Coins: <span id="ws-coins">0</span></p>
        <div class="upgrades" id="upgrade-buttons"></div>
        <button class="btn next" id="btn-next">NEXT WAVE</button>
    </div>

    <div id="gameover-screen" class="overlay hidden">
        <h1 id="go-title" class="lose">OVERRUN</h1>
        <p class="stat">Survived <span id="go-wave">1</span> waves</p>
        <p class="stat highlight">Score: <span id="go-score">0</span></p>
        <button class="btn retry" id="btn-retry">TRY AGAIN</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
