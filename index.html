<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Number Runner — LastTokens</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="game"></canvas>
    <div id="ui-overlay">
        <div id="start-screen" class="screen">
            <h1>NUMBER<br>RUNNER</h1>
            <p class="subtitle">Choose your gates. Grow your number. Smash through walls.</p>
            <button id="btn-start">PLAY</button>
            <p class="credit">Powered by <a href="https://github.com/last-tokens">LastTokens</a> — built with leftover AI tokens</p>
        </div>
        <div id="game-over-screen" class="screen hidden">
            <h1 id="gameover-title">GAME OVER</h1>
            <p id="final-level"></p>
            <p id="final-score"></p>
            <button id="btn-restart">PLAY AGAIN</button>
        </div>
    </div>
    <!-- Progress bar -->
    <div id="progress-bar">
        <div id="progress-fill"></div>
        <span id="level-label">LEVEL 1</span>
    </div>
    <script src="game.js"></script>
</body>
</html>
