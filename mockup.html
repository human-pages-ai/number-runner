<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visual Mockup</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; }
canvas { display: block; margin: 0 auto; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
    const aspect = 9/16;
    let w = window.innerWidth, h = window.innerHeight;
    if (w/h > aspect) w = h * aspect; else h = w / aspect;
    canvas.width = Math.floor(w);
    canvas.height = Math.floor(h);
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });

// ══════════════════════════════════════════
// PRE-RENDERED SPRITES — offscreen canvases
// ══════════════════════════════════════════

function createSprite(w, h, drawFn) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    const x = c.getContext('2d');
    drawFn(x, w, h);
    return c;
}

function rrectPath(x, cx, cy, w, h, r) {
    r = Math.min(r, w/2, h/2);
    x.beginPath();
    x.moveTo(cx+r, cy); x.lineTo(cx+w-r, cy);
    x.quadraticCurveTo(cx+w, cy, cx+w, cy+r); x.lineTo(cx+w, cy+h-r);
    x.quadraticCurveTo(cx+w, cy+h, cx+w-r, cy+h); x.lineTo(cx+r, cy+h);
    x.quadraticCurveTo(cx, cy+h, cx, cy+h-r); x.lineTo(cx, cy+r);
    x.quadraticCurveTo(cx, cy, cx+r, cy); x.closePath();
}

// ── SOLDIER SPRITE (256x256, facing away/forward) ──
const soldierSprite = createSprite(256, 256, (x, w, h) => {
    const cx = w/2, s = w;

    // Cyan selection ring
    x.strokeStyle = '#00e5ff';
    x.lineWidth = 4;
    x.beginPath();
    x.ellipse(cx, h - 20, 80, 25, 0, 0, Math.PI * 2);
    x.stroke();
    x.fillStyle = 'rgba(0,229,255,0.1)';
    x.fill();

    // Shadow
    x.fillStyle = 'rgba(0,0,0,0.25)';
    x.beginPath();
    x.ellipse(cx, h - 20, 50, 16, 0, 0, Math.PI * 2);
    x.fill();

    // Boots — thick, dark
    x.fillStyle = '#1a1a15';
    rrectPath(x, cx - 38, h - 55, 28, 38, 6);
    x.fill();
    rrectPath(x, cx + 10, h - 55, 28, 38, 6);
    x.fill();

    // Legs — camo pants, thick
    x.fillStyle = '#4a5a30';
    rrectPath(x, cx - 34, h - 100, 24, 52, 5);
    x.fill();
    x.fillStyle = '#3e5028';
    rrectPath(x, cx + 10, h - 100, 24, 52, 5);
    x.fill();
    // Knee pads
    x.fillStyle = '#3a4a25';
    rrectPath(x, cx - 32, h - 80, 20, 12, 3);
    x.fill();
    rrectPath(x, cx + 12, h - 80, 20, 12, 3);
    x.fill();

    // Torso — orange/tan tactical vest, wide and chunky
    const vestG = x.createLinearGradient(cx, h - 190, cx, h - 95);
    vestG.addColorStop(0, '#c08030');
    vestG.addColorStop(0.3, '#b07028');
    vestG.addColorStop(0.7, '#a06020');
    vestG.addColorStop(1, '#906018');
    x.fillStyle = vestG;
    rrectPath(x, cx - 48, h - 185, 96, 90, 12);
    x.fill();

    // Vest outline
    x.strokeStyle = '#604010';
    x.lineWidth = 2;
    rrectPath(x, cx - 48, h - 185, 96, 90, 12);
    x.stroke();

    // Vest details — pockets, MOLLE webbing
    x.fillStyle = 'rgba(0,0,0,0.12)';
    rrectPath(x, cx - 38, h - 165, 28, 22, 4);
    x.fill();
    rrectPath(x, cx + 10, h - 165, 28, 22, 4);
    x.fill();
    // Pocket flaps
    x.strokeStyle = 'rgba(0,0,0,0.15)';
    x.lineWidth = 1.5;
    x.beginPath(); x.moveTo(cx - 38, h - 165); x.lineTo(cx - 10, h - 165); x.stroke();
    x.beginPath(); x.moveTo(cx + 10, h - 165); x.lineTo(cx + 38, h - 165); x.stroke();
    // Belt
    x.fillStyle = '#3a3225';
    x.fillRect(cx - 48, h - 100, 96, 8);
    // Belt buckle
    x.fillStyle = '#888060';
    rrectPath(x, cx - 6, h - 101, 12, 10, 2);
    x.fill();

    // Backpack/plate carrier rear
    x.fillStyle = '#8a6020';
    rrectPath(x, cx - 40, h - 180, 80, 50, 8);
    x.fill();
    x.strokeStyle = '#604010';
    x.lineWidth = 1;
    rrectPath(x, cx - 40, h - 180, 80, 50, 8);
    x.stroke();
    // MOLLE lines
    for (let i = 0; i < 4; i++) {
        x.strokeStyle = 'rgba(0,0,0,0.08)';
        x.beginPath(); x.moveTo(cx - 35, h - 175 + i * 12); x.lineTo(cx + 35, h - 175 + i * 12); x.stroke();
    }

    // Arms — thick, with sleeves
    x.fillStyle = '#a06828';
    // Left arm
    x.save();
    x.translate(cx - 52, h - 170);
    x.rotate(-0.1);
    rrectPath(x, -14, 0, 28, 65, 8);
    x.fill();
    x.strokeStyle = '#604010';
    x.lineWidth = 1.5;
    rrectPath(x, -14, 0, 28, 65, 8);
    x.stroke();
    x.restore();
    // Right arm
    x.fillStyle = '#a06828';
    x.save();
    x.translate(cx + 52, h - 170);
    x.rotate(0.1);
    rrectPath(x, -14, 0, 28, 60, 8);
    x.fill();
    x.strokeStyle = '#604010';
    x.lineWidth = 1.5;
    rrectPath(x, -14, 0, 28, 60, 8);
    x.stroke();
    x.restore();

    // Hands — skin tone
    x.fillStyle = '#d4a870';
    x.beginPath(); x.arc(cx - 58, h - 108, 10, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(cx + 58, h - 112, 10, 0, Math.PI * 2); x.fill();

    // Neck
    x.fillStyle = '#d4a870';
    x.fillRect(cx - 10, h - 205, 20, 22);

    // Head
    x.fillStyle = '#d4a870';
    x.beginPath();
    x.arc(cx, h - 218, 28, 0, Math.PI * 2);
    x.fill();

    // Helmet — military green, detailed
    const helmG = x.createLinearGradient(cx, h - 252, cx, h - 210);
    helmG.addColorStop(0, '#4a6a30');
    helmG.addColorStop(0.5, '#3e5e28');
    helmG.addColorStop(1, '#345020');
    x.fillStyle = helmG;
    x.beginPath();
    x.arc(cx, h - 222, 33, Math.PI, 0);
    x.lineTo(cx + 38, h - 212);
    x.lineTo(cx - 38, h - 212);
    x.closePath();
    x.fill();
    // Helmet rim
    x.fillStyle = '#2e4418';
    x.beginPath();
    x.ellipse(cx, h - 212, 38, 10, 0, 0, Math.PI * 2);
    x.fill();
    // Helmet band
    x.strokeStyle = '#5a7a40';
    x.lineWidth = 3;
    x.beginPath();
    x.arc(cx, h - 222, 30, Math.PI * 0.85, Math.PI * 0.15);
    x.stroke();

    // Gun — assault rifle, pointing forward
    x.fillStyle = '#2a2a28';
    x.save();
    x.translate(cx + 25, h - 140);
    x.rotate(-0.05);
    // Stock
    x.fillStyle = '#3a3832';
    rrectPath(x, -8, 20, 16, 25, 3);
    x.fill();
    // Receiver
    x.fillStyle = '#2a2a28';
    rrectPath(x, -7, -50, 14, 72, 3);
    x.fill();
    // Barrel
    x.fillStyle = '#333';
    x.fillRect(-4, -85, 8, 40);
    // Magazine
    x.fillStyle = '#222';
    rrectPath(x, 6, -20, 10, 30, 2);
    x.fill();
    // Muzzle flash
    const mfG = x.createRadialGradient(0, -88, 0, 0, -88, 25);
    mfG.addColorStop(0, 'rgba(255,240,150,0.9)');
    mfG.addColorStop(0.4, 'rgba(255,150,30,0.5)');
    mfG.addColorStop(1, 'rgba(255,60,0,0)');
    x.fillStyle = mfG;
    x.beginPath(); x.arc(0, -88, 25, 0, Math.PI * 2); x.fill();
    x.fillStyle = 'rgba(255,255,220,0.8)';
    x.beginPath(); x.arc(0, -88, 8, 0, Math.PI * 2); x.fill();
    x.restore();
});

// ── ZOMBIE SPRITE (256x300) ──
const zombieSprite = createSprite(256, 300, (x, w, h) => {
    const cx = w/2;

    // Shadow
    x.fillStyle = 'rgba(0,0,0,0.25)';
    x.beginPath();
    x.ellipse(cx, h - 15, 55, 18, 0, 0, Math.PI * 2);
    x.fill();

    // Feet — bare, gnarled
    x.fillStyle = '#4a3a20';
    x.beginPath(); x.ellipse(cx - 25, h - 22, 16, 8, -0.2, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.ellipse(cx + 25, h - 22, 16, 8, 0.2, 0, Math.PI * 2); x.fill();

    // Legs — torn pants
    x.fillStyle = '#3a3020';
    rrectPath(x, cx - 32, h - 90, 22, 68, 5);
    x.fill();
    rrectPath(x, cx + 10, h - 90, 22, 68, 5);
    x.fill();
    // Torn edges
    x.fillStyle = '#5a4a30';
    x.beginPath();
    x.moveTo(cx - 32, h - 30); x.lineTo(cx - 28, h - 40); x.lineTo(cx - 18, h - 28);
    x.lineTo(cx - 14, h - 38); x.lineTo(cx - 10, h - 30); x.closePath();
    x.fill();
    x.beginPath();
    x.moveTo(cx + 10, h - 30); x.lineTo(cx + 14, h - 40); x.lineTo(cx + 24, h - 28);
    x.lineTo(cx + 28, h - 38); x.lineTo(cx + 32, h - 30); x.closePath();
    x.fill();

    // Torso — decomposed, greenish-brown, muscular
    const bodyG = x.createLinearGradient(cx, h - 190, cx, h - 85);
    bodyG.addColorStop(0, '#5a4a28');
    bodyG.addColorStop(0.3, '#6a5530');
    bodyG.addColorStop(0.6, '#5a4828');
    bodyG.addColorStop(1, '#4a3a20');
    x.fillStyle = bodyG;
    rrectPath(x, cx - 45, h - 185, 90, 100, 10);
    x.fill();

    // Torn shirt/skin details
    x.strokeStyle = 'rgba(0,0,0,0.2)';
    x.lineWidth = 1.5;
    for (let i = 0; i < 4; i++) {
        const ly = h - 175 + i * 22;
        x.beginPath();
        x.moveTo(cx - 30 + Math.random()*10, ly);
        x.lineTo(cx + 20 + Math.random()*10, ly + 5);
        x.stroke();
    }
    // Wounds/gashes
    x.fillStyle = 'rgba(120,30,20,0.4)';
    x.beginPath(); x.ellipse(cx - 15, h - 150, 8, 3, -0.3, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.ellipse(cx + 20, h - 130, 6, 3, 0.5, 0, Math.PI * 2); x.fill();

    // Outline
    x.strokeStyle = '#2a2015';
    x.lineWidth = 2;
    rrectPath(x, cx - 45, h - 185, 90, 100, 10);
    x.stroke();

    // Arms — reaching forward, thick and muscular
    x.fillStyle = '#5a4a28';
    // Left arm reaching up-left
    x.save();
    x.translate(cx - 48, h - 170);
    x.rotate(-0.8);
    rrectPath(x, -14, -70, 28, 80, 8);
    x.fill();
    x.strokeStyle = '#3a2a15';
    x.lineWidth = 2;
    rrectPath(x, -14, -70, 28, 80, 8);
    x.stroke();
    // Claw hand
    x.fillStyle = '#4a3a20';
    for (let f = -2; f <= 2; f++) {
        x.beginPath();
        x.moveTo(f * 6, -70);
        x.lineTo(f * 8 - 2, -88);
        x.lineTo(f * 8 + 2, -88);
        x.lineTo(f * 6 + 3, -70);
        x.fill();
    }
    x.restore();
    // Right arm reaching up-right
    x.fillStyle = '#5a4a28';
    x.save();
    x.translate(cx + 48, h - 170);
    x.rotate(0.8);
    rrectPath(x, -14, -70, 28, 80, 8);
    x.fill();
    x.strokeStyle = '#3a2a15';
    x.lineWidth = 2;
    rrectPath(x, -14, -70, 28, 80, 8);
    x.stroke();
    // Claw hand
    x.fillStyle = '#4a3a20';
    for (let f = -2; f <= 2; f++) {
        x.beginPath();
        x.moveTo(f * 6, -70);
        x.lineTo(f * 8 - 2, -88);
        x.lineTo(f * 8 + 2, -88);
        x.lineTo(f * 6 + 3, -70);
        x.fill();
    }
    x.restore();

    // Neck
    x.fillStyle = '#5a4a28';
    x.fillRect(cx - 12, h - 208, 24, 25);

    // Head — larger, menacing
    const headG = x.createRadialGradient(cx, h - 225, 0, cx, h - 225, 32);
    headG.addColorStop(0, '#6a5530');
    headG.addColorStop(1, '#4a3820');
    x.fillStyle = headG;
    x.beginPath();
    x.arc(cx, h - 225, 32, 0, Math.PI * 2);
    x.fill();
    x.strokeStyle = '#3a2815';
    x.lineWidth = 2;
    x.stroke();

    // Brow ridge
    x.fillStyle = '#4a3820';
    x.beginPath();
    x.ellipse(cx, h - 235, 28, 8, 0, Math.PI, 0);
    x.fill();

    // Eyes — glowing orange/red
    x.shadowColor = '#ff4400';
    x.shadowBlur = 15;
    x.fillStyle = '#ff4400';
    x.beginPath(); x.arc(cx - 12, h - 230, 6, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(cx + 12, h - 230, 6, 0, Math.PI * 2); x.fill();
    // Bright center
    x.fillStyle = '#ff8800';
    x.beginPath(); x.arc(cx - 12, h - 230, 3, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(cx + 12, h - 230, 3, 0, Math.PI * 2); x.fill();
    x.shadowBlur = 0;

    // Mouth — open, snarling
    x.fillStyle = '#1a0a00';
    x.beginPath();
    x.ellipse(cx, h - 212, 14, 9, 0, 0, Math.PI * 2);
    x.fill();
    // Teeth
    x.fillStyle = '#c0b898';
    for (let t = -3; t <= 3; t++) {
        x.fillRect(cx + t * 4 - 1, h - 218, 3, 5);
    }
});

// ── BOSS ZOMBIE SPRITE (512x600) — much larger, more detail ──

        x.lineTo(f * 14 - 4, -155);

        x.lineTo(f * 10 + 5, -120);

    x.save();

});

// ── BARREL+TURRET SPRITE (256x256) ──
const barrelSprite = createSprite(256, 300, (x, w, h) => {
    const cx = w/2;
    const bw = 180, bh = 140;
    const by = h - 30;

    // Shadow
    x.fillStyle = 'rgba(0,0,0,0.3)';
    x.beginPath();
    x.ellipse(cx, by, 85, 22, 0, 0, Math.PI * 2);
    x.fill();

    // Crate body — dark wood with grain
    const crateG = x.createLinearGradient(cx - bw/2, by - bh, cx + bw/2, by);
    crateG.addColorStop(0, '#4a4035');
    crateG.addColorStop(0.2, '#5a4e42');
    crateG.addColorStop(0.4, '#4a4035');
    crateG.addColorStop(0.6, '#5a4e42');
    crateG.addColorStop(0.8, '#4a4035');
    crateG.addColorStop(1, '#3a3228');
    x.fillStyle = crateG;
    rrectPath(x, cx - bw/2, by - bh, bw, bh, 8);
    x.fill();

    // Wood grain lines
    x.strokeStyle = 'rgba(0,0,0,0.1)';
    x.lineWidth = 1;
    for (let i = 0; i < 6; i++) {
        const ly = by - bh + 10 + i * (bh / 6);
        x.beginPath(); x.moveTo(cx - bw/2 + 8, ly); x.lineTo(cx + bw/2 - 8, ly); x.stroke();
    }

    // Metal bands
    x.strokeStyle = '#6a6258';
    x.lineWidth = 4;
    x.beginPath(); x.moveTo(cx - bw/2, by - bh * 0.2); x.lineTo(cx + bw/2, by - bh * 0.2); x.stroke();
    x.beginPath(); x.moveTo(cx - bw/2, by - bh * 0.5); x.lineTo(cx + bw/2, by - bh * 0.5); x.stroke();
    x.beginPath(); x.moveTo(cx - bw/2, by - bh * 0.8); x.lineTo(cx + bw/2, by - bh * 0.8); x.stroke();

    // Corner brackets
    x.fillStyle = '#5a5248';
    for (const sx of [-1, 1]) {
        for (const sy of [0, 1]) {
            const bx = cx + sx * bw/2 - (sx > 0 ? 16 : 0);
            const byy = by - bh + sy * (bh - 20);
            rrectPath(x, bx, byy, 16, 20, 2);
            x.fill();
        }
    }

    // Crate outline
    x.strokeStyle = '#2a2420';
    x.lineWidth = 3;
    rrectPath(x, cx - bw/2, by - bh, bw, bh, 8);
    x.stroke();

    // ── Mounted turret on top ──
    const ty = by - bh - 10;

    // Tripod
    x.strokeStyle = '#008898';
    x.lineWidth = 5;
    x.lineCap = 'round';
    x.beginPath(); x.moveTo(cx - 10, ty); x.lineTo(cx - 55, ty + 40); x.stroke();
    x.beginPath(); x.moveTo(cx + 10, ty); x.lineTo(cx + 55, ty + 40); x.stroke();
    x.beginPath(); x.moveTo(cx, ty); x.lineTo(cx, ty + 30); x.stroke();

    // Gun body — recognizable weapon shape
    x.fillStyle = '#00c8d8';
    x.beginPath();
    x.moveTo(cx - 55, ty - 5);   // left rear
    x.lineTo(cx - 55, ty - 30);  // left top
    x.lineTo(cx - 30, ty - 38);  // rear sight
    x.lineTo(cx + 30, ty - 38);  // top flat
    x.lineTo(cx + 50, ty - 28);  // front slope
    x.lineTo(cx + 50, ty - 5);   // right bottom
    x.closePath();
    x.fill();
    x.strokeStyle = '#009ab0';
    x.lineWidth = 2;
    x.stroke();

    // Barrel — long, pointing up-screen
    x.fillStyle = '#00aabb';
    x.fillRect(cx - 6, ty - 90, 12, 55);
    // Second barrel
    x.fillStyle = '#0098a8';
    x.fillRect(cx - 20, ty - 85, 10, 50);
    // Muzzle tips
    x.fillStyle = '#00e5ff';
    x.shadowColor = '#00e5ff';
    x.shadowBlur = 12;
    x.beginPath(); x.arc(cx, ty - 92, 7, 0, Math.PI * 2); x.fill();
    x.beginPath(); x.arc(cx - 15, ty - 87, 6, 0, Math.PI * 2); x.fill();
    x.shadowBlur = 0;

    // Ammo drum
    x.fillStyle = '#008090';
    x.beginPath();
    x.arc(cx + 42, ty - 18, 18, 0, Math.PI * 2);
    x.fill();
    x.strokeStyle = '#006070';
    x.lineWidth = 2;
    x.stroke();
    // Drum center
    x.strokeStyle = '#007080';
    x.beginPath(); x.arc(cx + 42, ty - 18, 10, 0, Math.PI * 2); x.stroke();

    // Handle
    x.fillStyle = '#00a8b8';
    rrectPath(x, cx - 62, ty - 25, 14, 28, 4);
    x.fill();

    x.lineCap = 'butt';
});

// ══════════════════════════
// MAIN DRAWING
// ══════════════════════════

function radGlow(x, y, r, c1, c2, c3) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, c1); g.addColorStop(0.5, c2); g.addColorStop(1, c3);
    return g;
}

let W, H, cx, vpY;
const roadBottomFrac = 0.92;
const roadTopFrac = 0.52;

function roadX(xNorm, t) {
    const rw = (roadTopFrac + (roadBottomFrac - roadTopFrac) * t) * W;
    return cx + xNorm * rw / 2;
}
function roadY(t) { return vpY + (H - vpY) * t; }
function roadS(t) { return t; }

function drawSpriteAt(sprite, xNorm, t, scale) {
    const x = roadX(xNorm, t);
    const y = roadY(t);
    const s = roadS(t) * scale;
    const dw = sprite.width * s;
    const dh = sprite.height * s;
    ctx.drawImage(sprite, x - dw/2, y - dh + dh * 0.08, dw, dh);
}

function rrect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r); ctx.lineTo(x+w,y+h-r);
    ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h); ctx.lineTo(x+r,y+h);
    ctx.quadraticCurveTo(x,y+h,x,y+h-r); ctx.lineTo(x,y+r);
    ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
}

function drawFire(x, y, radius, intensity) {
    for (let layer = 0; layer < 5; layer++) {
        const lr = radius * (1 - layer * 0.15);
        const ox = (Math.random() - 0.5) * radius * 0.2;
        const oy = (Math.random() - 0.5) * radius * 0.2;
        const alpha = intensity * (1 - layer * 0.15);
        const colors = [
            [`rgba(255,220,120,${alpha})`, `rgba(240,120,10,${alpha*0.7})`, `rgba(180,40,0,0)`],
            [`rgba(255,160,50,${alpha*0.8})`, `rgba(220,60,0,${alpha*0.5})`, `rgba(100,10,0,0)`],
        ];
        const c = colors[layer % 2];
        ctx.fillStyle = radGlow(x+ox, y+oy, lr, c[0], c[1], c[2]);
        ctx.beginPath();
        ctx.arc(x+ox, y+oy - lr * 0.3, lr, 0, Math.PI * 2);
        ctx.fill();
    }
}

function draw() {
    W = canvas.width; H = canvas.height; cx = W/2;
    vpY = H * 0.02;
    const rbW = W * roadBottomFrac;
    const rtW = W * roadTopFrac;

    // ── Background ──
    ctx.fillStyle = '#62625a';
    ctx.fillRect(0, 0, W, H);

    // ── Road surface ──
    const roadGrad = ctx.createLinearGradient(0, vpY, 0, H);
    roadGrad.addColorStop(0, '#9a9888');
    roadGrad.addColorStop(0.5, '#aca99a');
    roadGrad.addColorStop(1, '#b8b5a5');
    ctx.fillStyle = roadGrad;
    ctx.beginPath();
    ctx.moveTo(cx - rbW/2, H);
    ctx.lineTo(cx + rbW/2, H);
    ctx.lineTo(cx + rtW/2, vpY);
    ctx.lineTo(cx - rtW/2, vpY);
    ctx.closePath();
    ctx.fill();

    // Road texture
    ctx.globalAlpha = 0.04;
    for (let i = 0; i < 40; i++) {
        const t = 0.1 + i * 0.022;
        const y = roadY(t);
        const lw = (roadTopFrac + (roadBottomFrac - roadTopFrac) * t) * W;
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(cx - lw/2 + 5, y); ctx.lineTo(cx + lw/2 - 5, y); ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // ── Walls ──
    function drawWall(side) {
        const s = side;
        const wallThick = 0.14;
        for (let i = 0; i < 30; i++) {
            const t1 = i * 0.033 + 0.02;
            const t2 = t1 + 0.034;
            if (t1 > 0.98) break;
            const rw1 = (roadTopFrac + (roadBottomFrac - roadTopFrac) * t1) * W;
            const rw2 = (roadTopFrac + (roadBottomFrac - roadTopFrac) * t2) * W;
            const ww1 = W * wallThick * t1 * 2.5;
            const ww2 = W * wallThick * t2 * 2.5;
            const wallH1 = H * 0.05 * t1;
            const wallH2 = H * 0.05 * t2;
            const ex1 = cx + s * rw1/2;
            const ex2 = cx + s * rw2/2;
            const ox1 = ex1 + s * ww1;
            const ox2 = ex2 + s * ww2;
            const y1 = roadY(t1);
            const y2 = roadY(t2);
            const shade = 0.28 + t1 * 0.12;
            ctx.fillStyle = `rgb(${Math.round(shade*255)},${Math.round(shade*245)},${Math.round(shade*230)})`;
            ctx.beginPath();
            ctx.moveTo(ex1, y1 - wallH1); ctx.lineTo(ex2, y2 - wallH2);
            ctx.lineTo(ox2, y2 - wallH2); ctx.lineTo(ox1, y1 - wallH1);
            ctx.closePath(); ctx.fill();
            ctx.fillStyle = `rgb(${Math.round(shade*220)},${Math.round(shade*210)},${Math.round(shade*195)})`;
            ctx.beginPath();
            ctx.moveTo(ex1, y1); ctx.lineTo(ex2, y2);
            ctx.lineTo(ex2, y2 - wallH2); ctx.lineTo(ex1, y1 - wallH1);
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = `rgba(0,0,0,${0.06 + t1 * 0.06})`;
            ctx.lineWidth = Math.max(0.5, t1 * 1.2);
            for (let p = 0.25; p <= 0.75; p += 0.25) {
                ctx.beginPath(); ctx.moveTo(ex1, y1 - wallH1 * p); ctx.lineTo(ex2, y2 - wallH2 * p); ctx.stroke();
            }
            ctx.strokeStyle = `rgba(180,175,160,${0.3 + t1 * 0.3})`;
            ctx.lineWidth = Math.max(1, t1 * 3);
            ctx.beginPath(); ctx.moveTo(ex1, y1 - wallH1); ctx.lineTo(ex2, y2 - wallH2); ctx.stroke();
        }
    }
    drawWall(-1);
    drawWall(1);

    // ── Center dashes ──
    for (let i = 0; i < 20; i++) {
        const t = 0.15 + i * 0.04;
        if (t > 0.95) break;
        const y1 = roadY(t);
        const y2 = roadY(t + 0.015);
        ctx.strokeStyle = `rgba(190,185,170,${0.15 + t * 0.25})`;
        ctx.lineWidth = Math.max(0.5, t * 2.5);
        ctx.beginPath(); ctx.moveTo(cx, y1); ctx.lineTo(cx, y2); ctx.stroke();
    }

    // ── Barrels with turrets ──
    function drawBarrelAt(xNorm, t, label) {
        drawSpriteAt(barrelSprite, xNorm, t, W / 256 * 0.28);
        // HP label on top of barrel
        const bx = roadX(xNorm, t);
        const by = roadY(t);
        const s = roadS(t) * W * 0.28;
        const fontSize = Math.round(s * 0.22);
        ctx.font = `bold ${fontSize}px system-ui`;
        ctx.textAlign = 'center';
        ctx.strokeStyle = 'rgba(0,0,0,0.8)';
        ctx.lineWidth = 3;
        ctx.strokeText(label, bx, by - s * 0.25);
        ctx.fillStyle = '#ff5533';
        ctx.fillText(label, bx, by - s * 0.25);
    }

    drawBarrelAt(-0.55, 0.30, '100');
    drawBarrelAt(-0.22, 0.30, '120');
    drawBarrelAt(0.22, 0.30, '100');
    drawBarrelAt(0.55, 0.30, '120');

    // ── Boss zombie with massive fire ──
    const bossX = roadX(0, 0.33);
    const bossY = roadY(0.33);
    const bossS = roadS(0.33) * W * 0.22;

    // Fire behind boss
    drawFire(bossX, bossY - bossS * 0.2, bossS * 0.6, 0.9);
    drawFire(bossX - bossS * 0.3, bossY - bossS * 0.3, bossS * 0.45, 0.8);
    drawFire(bossX + bossS * 0.25, bossY - bossS * 0.25, bossS * 0.5, 0.85);
    drawFire(bossX, bossY - bossS * 0.7, bossS * 0.55, 0.95);
    drawFire(bossX - bossS * 0.2, bossY - bossS * 0.9, bossS * 0.4, 0.85);
    drawFire(bossX + bossS * 0.15, bossY - bossS * 0.8, bossS * 0.45, 0.8);
    drawFire(bossX, bossY - bossS * 1.3, bossS * 0.5, 0.9);
    drawFire(bossX + bossS * 0.1, bossY - bossS * 1.6, bossS * 0.4, 0.75);
    drawFire(bossX - bossS * 0.1, bossY - bossS * 1.9, bossS * 0.35, 0.6);
    drawFire(bossX, bossY - bossS * 2.1, bossS * 0.25, 0.45);

    // Boss sprite — large
    drawSpriteAt(bossSprite, 0, 0.33, W / 512 * 0.45);

    // Boss HP bar
    const hpBarW = bossS * 1.2;
    const hpBarH = bossS * 0.12;
    const hpBarY = bossY - bossS * 2.8;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    rrect(bossX - hpBarW/2, hpBarY, hpBarW, hpBarH, hpBarH/2); ctx.fill();
    ctx.fillStyle = '#ff3333';
    rrect(bossX - hpBarW/2 + 2, hpBarY + 2, (hpBarW - 4) * 0.72, hpBarH - 4, (hpBarH-4)/2); ctx.fill();
    // HP text
    const hpFS = Math.round(hpBarH * 0.9);
    ctx.font = `bold ${hpFS}px system-ui`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.fillText('4,580 / 6,400', bossX, hpBarY + hpBarH * 0.78);

    // Fire in front of boss
    drawFire(bossX - bossS * 0.4, bossY - bossS * 0.5, bossS * 0.3, 0.5);
    drawFire(bossX + bossS * 0.4, bossY - bossS * 0.4, bossS * 0.3, 0.55);

    // ── Regular zombies ──
    drawSpriteAt(zombieSprite, -0.25, 0.46, W / 256 * 0.18);
    drawSpriteAt(zombieSprite, 0.30, 0.43, W / 256 * 0.17);
    drawSpriteAt(zombieSprite, 0.05, 0.55, W / 256 * 0.16);
    drawSpriteAt(zombieSprite, -0.38, 0.52, W / 256 * 0.15);
    drawSpriteAt(zombieSprite, 0.35, 0.57, W / 256 * 0.14);

    // ── Fire sparks ──
    for (let i = 0; i < 25; i++) {
        const t = 0.35 + Math.random() * 0.25;
        const xn = (Math.random() - 0.5) * 0.7;
        const fx = roadX(xn, t);
        const fy = roadY(t);
        const fs = roadS(t) * W * 0.015;
        ctx.fillStyle = radGlow(fx, fy, fs,
            'rgba(255,200,50,0.7)', 'rgba(255,100,0,0.3)', 'rgba(255,50,0,0)');
        ctx.beginPath(); ctx.arc(fx, fy, fs, 0, Math.PI * 2); ctx.fill();
    }

    // ── Damage number ──
    (function() {
        const x = roadX(0.02, 0.49);
        const y = roadY(0.49) - W * 0.07;
        const sz = Math.round(W * 0.075);
        ctx.font = `bold ${sz}px system-ui`;
        ctx.textAlign = 'center';
        ctx.strokeStyle = 'rgba(0,0,0,0.7)';
        ctx.lineWidth = 4;
        ctx.strokeText('128', x, y);
        ctx.fillStyle = '#fff';
        ctx.fillText('128', x, y);
    })();

    // ── Bullet streams ──
    function drawBulletStream(xNorm, tStart, tEnd, count) {
        for (let i = 0; i < count; i++) {
            const frac = i / count;
            const t = tStart + (tEnd - tStart) * frac;
            const x = roadX(xNorm, t);
            const y = roadY(t);
            const sz = roadS(t) * 3.5;
            ctx.fillStyle = `rgba(255,210,30,${0.6 + Math.random() * 0.4})`;
            ctx.beginPath(); ctx.arc(x, y, Math.max(1.2, sz), 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = `rgba(255,150,0,${0.15 + Math.random() * 0.1})`;
            ctx.beginPath(); ctx.arc(x, y, sz * 2.5, 0, Math.PI * 2); ctx.fill();
        }
    }

    const solPositions = [-0.26, -0.13, 0, 0.13, 0.26];
    for (const sp of solPositions) {
        drawBulletStream(sp, 0.82, 0.48, 10);
    }

    // ── Soldiers ──
    for (const sp of solPositions) {
        const st = 0.84 + Math.abs(sp) * 0.02;
        drawSpriteAt(soldierSprite, sp, st, W / 256 * 0.18);
    }

    // ── Weapon icon (bottom-right) ──
    (function() {
        const r = W * 0.16;
        const ix = W * 0.82;
        const iy = H * 0.91;
        ctx.fillStyle = 'rgba(15,15,12,0.75)';
        ctx.beginPath(); ctx.arc(ix + r * 0.15, iy + r * 0.2, r * 1.1, 0, Math.PI * 2); ctx.fill();
        ctx.save();
        ctx.translate(ix, iy);
        ctx.rotate(-0.25);
        ctx.fillStyle = '#00c0d0';
        rrect(-r * 0.6, -r * 0.15, r * 1.1, r * 0.3, r * 0.05); ctx.fill();
        ctx.strokeStyle = '#009aaa'; ctx.lineWidth = 1.5;
        rrect(-r * 0.6, -r * 0.15, r * 1.1, r * 0.3, r * 0.05); ctx.stroke();
        ctx.fillStyle = '#00aabb';
        rrect(r * 0.5, -r * 0.08, r * 0.45, r * 0.16, r * 0.03); ctx.fill();
        ctx.fillStyle = '#00e5ff';
        ctx.beginPath(); ctx.arc(r * 0.95, 0, r * 0.06, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = '#008898';
        rrect(-r * 0.05, r * 0.12, r * 0.18, r * 0.38, r * 0.04); ctx.fill();
        ctx.fillStyle = '#009aaa';
        rrect(-r * 0.6, -r * 0.1, r * 0.2, r * 0.2, r * 0.03); ctx.fill();
        ctx.fillStyle = '#008090';
        rrect(-r * 0.72, -r * 0.12, r * 0.15, r * 0.24, r * 0.04); ctx.fill();
        ctx.fillStyle = '#007888';
        rrect(r * 0.1, r * 0.12, r * 0.15, r * 0.28, r * 0.02); ctx.fill();
        ctx.fillStyle = '#00d8e8';
        rrect(r * 0.15, -r * 0.28, r * 0.25, r * 0.1, r * 0.03); ctx.fill();
        ctx.restore();
        const ammoFS = Math.round(r * 0.4);
        ctx.font = `bold ${ammoFS}px system-ui`;
        ctx.textAlign = 'center';
        ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 3;
        ctx.strokeText('5', ix + r * 0.6, iy + r * 0.65);
        ctx.fillStyle = '#fff';
        ctx.fillText('5', ix + r * 0.6, iy + r * 0.65);
    })();

    // ── HUD top ──
    const hudFS = Math.round(W * 0.034);
    ctx.font = `bold ${hudFS}px system-ui`;
    ctx.textAlign = 'center';
    function hudPill(x, y, w, h, label, color) {
        ctx.fillStyle = 'rgba(0,0,0,0.45)';
        rrect(x, y, w, h, h/2); ctx.fill();
        ctx.fillStyle = color;
        ctx.fillText(label, x + w/2, y + h * 0.7);
    }
    hudPill(W * 0.52, H * 0.015, W * 0.18, H * 0.04, '160', '#ffdd44');
    hudPill(W * 0.72, H * 0.015, W * 0.18, H * 0.04, '112', '#88cc44');

    ctx.fillStyle = '#ee3333';
    ctx.beginPath(); ctx.arc(W * 0.95, H * 0.035, W * 0.04, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = '#cc2222'; ctx.lineWidth = 1.5; ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.round(W * 0.038)}px system-ui`;
    ctx.fillText('12', W * 0.95, H * 0.046);
}

draw();
</script>
